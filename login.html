<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kirjaudu - LunexChat</title>

<link rel="stylesheet" href="style.css">

<style>
.login-box{
    width:400px;
    margin:120px auto;
    background:#1e1e1e;
    padding:35px;
    border-radius:15px;
}

.login-box h1{
    text-align:center;
}

.login-box input{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#2b2b2b;
    color:white;
}

.login-box button{
    width:100%;
    margin-top:20px;
}
</style>

</head>
<body>

<div class="login-box">

<h1>LunexChat</h1>

<input type="email" placeholder="Sähköposti">

<input type="password" placeholder="Salasana">

<button onclick="window.location.href='chat.html'">
Kirjaudu
</button>

<br><br>

<center>
<a href="register.html">Luo uusi käyttäjä</a>
</center>

</div>

</body>
</html>
